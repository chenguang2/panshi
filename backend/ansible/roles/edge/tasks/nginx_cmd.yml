---
###################### run cmd ########################
- name: run
  script: "{{ nginx_cmd_script_path_name }} {{ nginx_cmd }} {{ prefix.split(',')[item|int] }} {{ ports.split(',')[item|int] }}"
  loop: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  register: cmd_output
  changed_when: false
  failed_when: cmd_output.stdout is search("still could not bind") or cmd_output.stdout is search("Failed to get the new Nginx process PID") or cmd_output.rc != 0
  ignore_errors: false
  no_log: false
  tags:
    - nginx_cmd_run


###################### gen log ########################
- name: out
  debug:
    msg: "{{ item.stdout_lines }}"
  loop: "{{ cmd_output.results | default([]) }}"
  when:
    - cmd_output is defined
    - cmd_output.results is defined
    - cmd_output.results | length > 0
    - item.stdout_lines is defined
  tags:
    - nginx_cmd_run
