
---
###################### run cmd ########################
- name: run
  script: "{{ unzip_script_path_name }} {{ item.1 }} {{ item.2 }}"
  when: inventory_hostname == item.0
  with_together:
    - "{{ ips.split(',') }}"
    - "{{ srcpath.split(',') }}"
    - "{{ destpath.split(',') }}"
  register: cmd_output
  changed_when: false
  failed_when: false
  ignore_errors: false
  no_log: false
  tags:
    - edge_unzip


###################### gen log ########################
- name: gen
  set_fact:
    log_messages: "{{ log_messages | default([]) + [item.stdout_lines] }}"
  loop: "{{ cmd_output.results | default([]) }}"
  when:
    - cmd_output is defined
    - cmd_output.results is defined
    - cmd_output.results | length > 0
    - item.stdout_lines is defined
  tags:
    - edge_unzip

###################### show the final log ########################
- name: out
  debug:
    msg: "{{ log_messages }}"
  when: log_messages is defined
  tags:
    - edge_unzip

