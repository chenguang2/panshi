---
###################### copy via inline content (new) ########################
- name: backup existing edge.env
  ansible.builtin.shell:
    cmd: cp "{{ destpath.split(',')[item|int] }}/edge.env" "{{ destpath.split(',')[item|int] }}/edge.env.bak.$(date +%s)"
  loop: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  when: env_content is defined and env_content | length > 0
  ignore_errors: true
  tags:
    - edge_init_env

- name: write edge.env from content
  ansible.builtin.copy:
    content: "{{ env_content }}"
    dest: "{{ destpath.split(',')[item|int] }}/edge.env"
  loop: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  when: env_content is defined and env_content | length > 0
  tags:
    - edge_init_env

- name: init env from content
  shell:
    cd {{ destpath.split(',')[item|int] }};
    bin/edge init;
  loop: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  when: env_content is defined and env_content | length > 0
  register: cmd_output
  changed_when: false
  failed_when: false
  ignore_errors: false
  no_log: false
  tags:
    - edge_init_env

###################### edge init openresty (legacy) ########################
- name: copy env file
  ansible.builtin.copy:
    src: "{{ srcpath }}"
    dest: "{{ destpath.split(',')[item|int] }}/{{ 'edge.env' if (filetype | default('')) == 'env' else srcpath | basename }}"
  loop: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  when: env_content is not defined or env_content | length == 0
  tags:
    - edge_init_env

- name: decompressing env files
  shell:
    tar xf {{ destpath.split(',')[item|int] }}/{{ srcpath | basename }} -C {{ destpath.split(',')[item|int] }}/;
    cd {{ destpath.split(',')[item|int] }};
    bin/edge init;
  loop: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  when: (filetype | default('')) in ['site', 'env_site'] and (env_content is not defined or env_content | length == 0)
  tags:
    - edge_init_env

- name: init env (legacy)
  shell:
    cd {{ destpath.split(',')[item|int] }};
    bin/edge init;
  loop: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  when: env_content is not defined or env_content | length == 0
  register: cmd_output
  changed_when: false
  failed_when: false
  ignore_errors: false
  no_log: false
  tags:
    - edge_init_env

###################### gen log ########################
- name: out
  debug:
    msg: "{{ item.stdout_lines }}"
  loop: "{{ cmd_output.results | default([]) }}"
  when:
    - cmd_output is defined
    - cmd_output.results is defined
    - cmd_output.results | length > 0
    - item.stdout_lines is defined
  tags:
    - edge_init_env