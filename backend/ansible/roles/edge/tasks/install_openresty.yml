---
- name: Create remote directories
  file:
    path: "{{ item.1 }}/soft/"
    state: directory
  loop: "{{ ips.split(',') | zip(destpath.split(',') | list) | list }}"
  when: inventory_hostname == item.0
  tags: [install_openresty_copy]

- name: Copy tar file
  copy:
    src: "{{ srcpath }}/openresty-edge-26063014.tar.gz"
    dest: "{{ item.1 }}/soft/openresty-edge-26063014.tar.gz"
  loop: "{{ ips.split(',') | zip(destpath.split(',') | list) | list }}"
  when: inventory_hostname == item.0
  tags: [install_openresty_copy]

- name: Decompress openresty files
  shell:
    cmd: "tar xf {{ item.1 }}/soft/openresty-edge-26063014.tar.gz -C {{ item.1 }}/soft/"
  loop: "{{ ips.split(',') | zip(destpath.split(',') | list) | list }}"
  when: inventory_hostname == item.0
  tags: [install_openresty_copy]
