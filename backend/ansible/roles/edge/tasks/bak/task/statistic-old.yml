
---
- name: set host instance
  set_fact:
    host_instance_indexs: "{{ lookup('ansible.utils.index_of', ips, 'eq', inventory_hostname, wantlist=True) }}"
  tags:
    - edge_statistic

###################### run cmd ########################
- name: run
  script: "{{ cron_check_script_path_name }} {{ prefix.split(',')[item|int] }} {{ ports.split(',')[item|int] }}"
  loop: "{{ host_instance_indexs }}"
  register: cmd_output
  changed_when: false
  failed_when: false
  ignore_errors: false
  no_log: false
  tags:
    - edge_statistic

###################### gen log ########################
- name: gen
  set_fact:
    log_messages: "{{ log_messages | default([]) + [item.stdout_lines] }}"
  loop: "{{ cmd_output.results | default([]) }}"
  when:
    - cmd_output is defined
    - cmd_output.results is defined
    - cmd_output.results | length > 0
    - item.stdout_lines is defined
  tags:
    - edge_statistic

###################### show the final log ########################
- name: out
  debug:
    msg: "{{ log_messages }}"
  when: log_messages is defined
  tags:
    - edge_statistic
