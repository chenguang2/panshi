---
######################重新加载edge########################
- name: 重新加载nginx服务
  shell: "{{ item.1 }}/nginx -s reload"
  when: inventory_hostname == item.0
  with_together:
    - "{{ ips.split(',') }}"
    - "{{ paths.split(',') }}"
  changed_when: false
  no_log: true
  failed_when: false
  tags:
    - edge_reload

