- name: 解压压缩文件
 ansible.builtin.unarchive:
   src: "{{ destpath }}/{{ inventory_hostname }}/{{ work_paths }}/{{ file_name }}.tar.gz"
   dest: "{{ work_paths }}"  # 替换成ansible-runner主机上的目标目录
   remote_src: yes
   remote_user: root
   delegate_to: 192.168.100.71
 tags:
   - edge_slave_copy

