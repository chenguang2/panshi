---
- name: 创建临时目录
  ansible.builtin.tempfile:
    state: directory
  register: temp_dir
  tags:
  - edge_slave_dir_copy_to_master  

- name: 打印临时目录
  debug:
    var: temp_dir.path
  tags:
  - edge_slave_dir_copy_to_master  

- name: 提取最后一个目录或文件名
  set_fact:
    last_path: "{{ srcpath | ansible.builtin.path('basename') }}"
  tags:
  - edge_slave_dir_copy_to_master  

- name: 打印变量值
  debug:
    var: last_path  
  tags:
  - edge_slave_dir_copy_to_master      

- name: 提取路径的最后一个目录或文件名之前的部分
  set_fact:
    pre_path: "{{ srcpath | ansible.builtin.path('dirname') }}"
  tags:
  - edge_slave_dir_copy_to_master 

- name: 打印变量值
  debug:
    var: pre_path
  tags:
  - edge_slave_dir_copy_to_master     
######################拷贝slave文件########################
- name: 打包目录文件
  shell: "tar -zcvf {{ temp_dir.path }}/{{ last_path }}.tar.gz -C{{ pre_path }}/ {{ last_path }}"
  tags:
  - edge_slave_dir_copy_to_master 

- name: 拷贝压缩文件从 slave 到 Master
  ansible.builtin.fetch:
    src: "{{ temp_dir.path }}/{{ last_path }}.tar.gz"
    dest: "{{ destpath }}"
    flat: true
  tags:
  - edge_slave_dir_copy_to_master 

