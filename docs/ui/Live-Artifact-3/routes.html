<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>磐石网关管理平台 - 路由管理</title>
  <link rel="stylesheet" href="styles/theme.css">
  <style>
    .route-filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .route-filter-bar .search-input-wrap input { width: 240px; }
    .method-tag { display: inline-block; padding: 0 5px; border-radius: 3px; font-size: 10px; font-weight: 600; font-family: var(--font-mono); margin-right: 2px; background: var(--bg); border: 1px solid var(--border); }
    .method-tag.GET { border-color: oklch(55% 0.15 145 / 30%); color: var(--success); }
    .method-tag.POST { border-color: oklch(56% 0.16 210 / 30%); color: var(--accent); }
    .method-tag.PUT { border-color: oklch(65% 0.15 85 / 30%); color: var(--warning); }
    .method-tag.DELETE { border-color: oklch(55% 0.18 28 / 30%); color: var(--danger); }
    .method-tag.PATCH { border-color: oklch(55% 0.12 240 / 30%); color: var(--info); }
    .priority-badge { font-family: var(--font-mono); font-size: 11px; }
    .uri-cell { font-family: var(--font-mono); font-size: 12px; }
    .route-plugins { display: flex; gap: 4px; flex-wrap: wrap; }
    .route-plugins .mini-tag { font-size: 10px; padding: 0 5px; border-radius: 3px; background: oklch(56% 0.16 210 / 8%); color: var(--accent); }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-chip { padding: 4px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); user-select: none; transition: all 0.15s; }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: oklch(56% 0.16 210 / 10%); border-color: var(--accent); color: var(--accent); }
    .route-detail-plugins { margin-top: 12px; }
    .route-detail-plugins .pd-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .route-detail-plugins .pd-item:last-child { border-bottom: none; }
    @media (max-width: 768px) {
      .route-filter-bar { flex-direction: column; align-items: stretch; }
      .route-filter-bar .search-input-wrap input { width: 100%; }
      .filter-chips { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">磐</div>
        <span class="sidebar-logo-text">磐石</span>
        <span class="sidebar-logo-version">v1.0</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">核心功能</div>
          <a class="nav-item" href="index.html"><span class="nav-icon">◉</span><span>概览</span></a>
          <a class="nav-item" href="clusters.html"><span class="nav-icon">◆</span><span>集群管理</span></a>
          <a class="nav-item active" href="routes.html"><span class="nav-icon">◇</span><span>路由管理</span></a>
          <a class="nav-item" href="upstreams.html"><span class="nav-icon">◎</span><span>上游管理</span></a>
          <a class="nav-item" href="nodes.html"><span class="nav-icon">●</span><span>节点管理</span></a>
          <a class="nav-item" href="plugin-configs.html"><span class="nav-icon">▣</span><span>插件组</span></a>
          <a class="nav-item" href="global-rules.html"><span class="nav-icon">⚙</span><span>全局规则</span></a>
          <a class="nav-item" href="static-resources.html"><span class="nav-icon">▣</span><span>静态资源</span></a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">系统管理</div>
          <a class="nav-item" href="plugins.html"><span class="nav-icon">▲</span><span>插件管理</span></a>
          <a class="nav-item" href="users.html"><span class="nav-icon">■</span><span>用户管理</span></a>
          <a class="nav-item" href="plugin-switches.html"><span class="nav-icon">▣</span><span>插件开关</span></a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Edge功能</div>
          <a class="nav-item" href="edge-client.html"><span class="nav-icon">⬡</span><span>Edge直连</span></a>
          <a class="nav-item" href="edge-import.html"><span class="nav-icon">⬢</span><span>数据导入</span></a>
          <a class="nav-item" href="tools.html"><span class="nav-icon">▣</span><span>工具箱</span></a>
        </div>
      </nav>
    </aside>

    <div class="main-area">
      <header class="top-header">
        <div class="top-header-breadcrumb">
          <a href="index.html">首页</a> <span>/</span> <span>路由管理</span>
        </div>
        <div class="top-header-actions">
          <div class="header-search">
            <input type="text" placeholder="搜索功能或页面...">
            <span class="search-icon">🔍</span>
          </div>
          <div class="header-user">
            <div class="header-avatar">管</div>
            <span>管理员</span>
          </div>
        </div>
      </header>

      <div class="content-area">
        <div class="page-header">
          <div>
            <h1>路由管理</h1>
            <p>管理 API 路由规则，配置请求匹配、转发目标和插件</p>
          </div>
          <div class="page-header-actions">
            <select class="form-input" style="width:160px;height:32px;font-size:12px;" id="clusterFilter" onchange="renderRoutes()">
              <option value="all">全部集群</option>
              <option value="1">生产集群</option>
              <option value="2">预发集群</option>
              <option value="3">开发集群</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="publishAllRoutes()">发布全部</button>
            <button class="btn btn-primary" onclick="openRouteModal()">+ 新建路由</button>
          </div>
        </div>

        <!-- Filter chips -->
        <div class="filter-chips" id="methodFilter">
          <span class="filter-chip active" data-method="all" onclick="setMethodFilter('all')">全部</span>
          <span class="filter-chip" data-method="GET" onclick="setMethodFilter('GET')">GET</span>
          <span class="filter-chip" data-method="POST" onclick="setMethodFilter('POST')">POST</span>
          <span class="filter-chip" data-method="PUT" onclick="setMethodFilter('PUT')">PUT</span>
          <span class="filter-chip" data-method="DELETE" onclick="setMethodFilter('DELETE')">DELETE</span>
          <span class="filter-chip" data-method="PATCH" onclick="setMethodFilter('PATCH')">PATCH</span>
        </div>

        <div class="route-filter-bar">
          <div class="search-input-wrap">
            <input type="text" id="routeSearch" placeholder="搜索名称、URI、描述..." oninput="renderRoutes()">
            <span class="search-icon">🔍</span>
          </div>
          <select class="form-input" style="width:130px;height:32px;font-size:12px;" id="statusFilter" onchange="renderRoutes()">
            <option value="all">全部状态</option>
            <option value="1">启用</option>
            <option value="0">禁用</option>
          </select>
          <span class="text-muted text-sm" id="routeCount">共 12 条路由</span>
        </div>

        <div class="table-container" id="routeTable"></div>

        <div class="table-footer">
          <span class="text-muted text-sm" id="paginationInfo">第 1 页，共 1 页</span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

      <div id="toast-container" class="toast-container"></div>
    </div>
  </div>

  <!-- Route Modal -->
  <div class="modal-overlay" id="routeModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 id="routeModalTitle">新建路由</h2>
        <button class="modal-close" onclick="closeModal('routeModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">名称 <span class="required">*</span></label>
          <input type="text" id="rName" class="form-input" placeholder="api-route">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">URI <span class="required">*</span></label>
            <input type="text" id="rUri" class="form-input" placeholder="/api/*">
          </div>
          <div class="form-group">
            <label class="form-label">优先级</label>
            <input type="number" id="rPriority" class="form-input" value="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">请求方法</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <label class="checkbox-label"><input type="checkbox" class="method-cb" value="GET" checked> <span>GET</span></label>
            <label class="checkbox-label"><input type="checkbox" class="method-cb" value="POST" checked> <span>POST</span></label>
            <label class="checkbox-label"><input type="checkbox" class="method-cb" value="PUT"> <span>PUT</span></label>
            <label class="checkbox-label"><input type="checkbox" class="method-cb" value="DELETE"> <span>DELETE</span></label>
            <label class="checkbox-label"><input type="checkbox" class="method-cb" value="PATCH"> <span>PATCH</span></label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">所属集群</label>
            <select id="rCluster" class="form-input">
              <option value="1">生产集群</option>
              <option value="2">预发集群</option>
              <option value="3">开发集群</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">上游服务</label>
            <select id="rUpstream" class="form-input">
              <option value="1">user-service</option>
              <option value="2">order-service</option>
              <option value="3">payment-gateway</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Hosts</label>
          <input type="text" id="rHosts" class="form-input" placeholder="api.example.com">
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea id="rDesc" class="form-input" placeholder="路由描述" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label class="checkbox-label"><input type="checkbox" id="rStatus" checked> <span>启用</span></label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('routeModal')">取消</button>
        <button class="btn btn-primary" onclick="saveRoute()">保存</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    (function() {
      'use strict';

      var methodFilter = 'all';

      var routes = [
        { id: 1, cluster_id: 1, name: '用户 API', uri: '/api/v1/users/*', methods: 'GET,POST', priority: 0, status: 1, description: '用户管理相关接口', upstream_id: 1, hosts: 'api.example.com', plugins: ['limit-req', 'cors'], current_version: 5, created_at: '2024-01-15T10:30:00Z' },
        { id: 2, cluster_id: 1, name: '订单服务', uri: '/api/v1/orders/*', methods: 'GET,POST,PUT', priority: 0, status: 1, description: '订单 CRUD 接口', upstream_id: 2, hosts: 'api.example.com', plugins: ['limit-req'], current_version: 3, created_at: '2024-02-10T14:20:00Z' },
        { id: 3, cluster_id: 1, name: '支付网关', uri: '/api/v1/payments/*', methods: 'POST', priority: 10, status: 1, description: '支付接口（高优先级）', upstream_id: 3, hosts: 'api.example.com', plugins: ['limit-req', 'ip-restriction'], current_version: 7, created_at: '2024-03-05T09:00:00Z' },
        { id: 4, cluster_id: 1, name: '健康检查', uri: '/health', methods: 'GET', priority: 0, status: 1, description: '健康检查端点', upstream_id: 1, hosts: '', plugins: [], current_version: 1, created_at: '2024-03-10T08:00:00Z' },
        { id: 5, cluster_id: 1, name: '商品搜索', uri: '/api/v1/products/search', methods: 'GET', priority: 5, status: 0, description: '商品搜索（维护中）', upstream_id: 1, hosts: 'api.example.com', plugins: ['limit-req'], current_version: 2, created_at: '2024-03-20T16:45:00Z' },
        { id: 6, cluster_id: 1, name: '商品详情', uri: '/api/v1/products/*', methods: 'GET', priority: 0, status: 1, description: '商品详情接口', upstream_id: 1, hosts: 'api.example.com', plugins: ['cors'], current_version: 4, created_at: '2024-04-01T11:00:00Z' },
        { id: 7, cluster_id: 2, name: '搜索服务', uri: '/api/v2/search/*', methods: 'GET', priority: 0, status: 1, description: '全文搜索接口', upstream_id: 5, hosts: 'search.internal', plugins: ['limit-req', 'cors'], current_version: 3, created_at: '2024-04-10T09:30:00Z' },
        { id: 8, cluster_id: 2, name: '推荐 API', uri: '/api/v2/recommend/*', methods: 'GET', priority: 0, status: 1, description: '个性化推荐', upstream_id: 6, hosts: 'rec.internal', plugins: [], current_version: 1, created_at: '2024-04-20T14:00:00Z' },
        { id: 9, cluster_id: 2, name: '报表导出', uri: '/api/v2/reports/export', methods: 'POST', priority: 0, status: 0, description: '报表导出（暂未启用）', upstream_id: 5, hosts: '', plugins: ['ip-restriction'], current_version: 1, created_at: '2024-05-01T10:00:00Z' },
        { id: 10, cluster_id: 3, name: '开发调试', uri: '/api/v3/debug/*', methods: 'GET,POST,PUT,DELETE', priority: 0, status: 1, description: '开发环境调试接口', upstream_id: 7, hosts: '', plugins: ['cors'], current_version: 6, created_at: '2024-05-10T13:00:00Z' },
        { id: 11, cluster_id: 3, name: '数据导入', uri: '/api/v3/import/*', methods: 'POST', priority: 0, status: 1, description: '批量数据导入', upstream_id: 7, hosts: '', plugins: ['limit-req'], current_version: 2, created_at: '2024-05-20T15:30:00Z' },
        { id: 12, cluster_id: 3, name: '静态资源', uri: '/static/*', methods: 'GET', priority: 0, status: 1, description: '前端静态资源代理', upstream_id: 8, hosts: '', plugins: ['static-resource'], current_version: 3, created_at: '2024-06-01T09:00:00Z' }
      ];

      var editingId = null;
      var currentPage = 1;
      var pageSize = 10;
      var clusterNames = { 1: '生产集群', 2: '预发集群', 3: '开发集群' };
      var upstreamNames = { 1: 'user-service', 2: 'order-service', 3: 'payment-gateway', 5: 'search-service', 6: 'recommend-api', 7: 'dev-backend', 8: 'cache-service' };

      window.setMethodFilter = function(m) {
        methodFilter = m;
        document.querySelectorAll('#methodFilter .filter-chip').forEach(function(el) {
          el.classList.toggle('active', el.dataset.method === m);
        });
        currentPage = 1;
        renderRoutes();
      };

      function getFiltered() {
        var q = (document.getElementById('routeSearch').value || '').toLowerCase();
        var statusF = document.getElementById('statusFilter').value;
        var cluster = document.getElementById('clusterFilter').value;
        return routes.filter(function(r) {
          if (methodFilter !== 'all' && r.methods.indexOf(methodFilter) < 0) return false;
          if (cluster !== 'all' && r.cluster_id !== parseInt(cluster)) return false;
          if (statusF !== 'all' && r.status !== parseInt(statusF)) return false;
          if (q && r.name.toLowerCase().indexOf(q) < 0 && r.uri.toLowerCase().indexOf(q) < 0 && (r.description || '').toLowerCase().indexOf(q) < 0) return false;
          return true;
        });
      }

      window.renderRoutes = function() {
        var filtered = getFiltered();
        var total = filtered.length;
        var totalPages = Math.max(1, Math.ceil(total / pageSize));
        if (currentPage > totalPages) currentPage = totalPages;
        var start = (currentPage - 1) * pageSize;
        var page = filtered.slice(start, start + pageSize);

        document.getElementById('routeCount').textContent = '共 ' + total + ' 条路由';
        document.getElementById('paginationInfo').textContent = '第 ' + currentPage + ' 页，共 ' + totalPages + ' 页';

        var html = '<table><thead><tr><th style="width:30px;"><input type="checkbox"></th><th class="sortable" onclick="sortRoutes(\'name\')">名称 <span class="sort-icon">⇅</span></th><th>URI</th><th>方法</th><th>集群</th><th>优先级</th><th>状态</th><th class="sortable" onclick="sortRoutes(\'created_at\')">创建时间 <span class="sort-icon">⇅</span></th><th style="width:80px;">操作</th></tr></thead><tbody>';
        if (page.length === 0) {
          html += '<tr><td colspan="9"><div class="empty-state" style="padding:32px;"><div class="empty-state-icon">◇</div><p>暂无路由规则</p></div></td></tr>';
        } else {
          page.forEach(function(r) {
            var methods = r.methods.split(',').map(function(m) {
              return '<span class="method-tag ' + m + '">' + m + '</span>';
            }).join('');
            var statusHtml = r.status === 1
              ? '<span class="badge badge-success"><span class="status-dot online"></span>启用</span>'
              : '<span class="badge badge-danger"><span class="status-dot offline"></span>禁用</span>';
            var pluginsHtml = r.plugins.length > 0 ? '<div class="route-plugins">' + r.plugins.map(function(p) {
              return '<span class="mini-tag">' + p + '</span>';
            }).join('') + '</div>' : '<span class="text-muted text-sm">—</span>';
            html += '<tr>' +
              '<td><input type="checkbox"></td>' +
              '<td><div class="cell-primary">' + r.name + '</div><div class="cell-secondary">' + (r.description || '-') + '</div></td>' +
              '<td><span class="uri-cell">' + r.uri + '</span></td>' +
              '<td>' + methods + '</td>' +
              '<td>' + (clusterNames[r.cluster_id] || '-') + '</td>' +
              '<td><span class="priority-badge">' + r.priority + '</span></td>' +
              '<td>' + statusHtml + '</td>' +
              '<td><span class="cell-secondary">' + window.formatDate(r.created_at) + '</span></td>' +
              '<td><div class="action-menu">' +
                '<button class="action-btn" onclick="toggleActionMenu(this)">⋯</button>' +
                '<div class="action-dropdown">' +
                  '<button class="action-dropdown-item" onclick="window.editRoute(' + r.id + ')">编辑</button>' +
                  '<button class="action-dropdown-item" onclick="window.toggleRoute(' + r.id + ')">' + (r.status === 1 ? '禁用' : '启用') + '</button>' +
                  '<button class="action-dropdown-item" onclick="window.publishRoute(' + r.id + ')">发布</button>' +
                  '<button class="action-dropdown-item danger" onclick="window.deleteRoute(' + r.id + ')">删除</button>' +
                '</div></div></td>' +
            '</tr>';
          });
        }
        html += '</tbody></table>';
        document.getElementById('routeTable').innerHTML = html;
        window.renderPagination(document.getElementById('pagination'), currentPage, totalPages);
      };

      window.goPage = function(p) { currentPage = p; renderRoutes(); };

      var sortField = null;
      var sortOrder = 'asc';
      window.sortRoutes = function(field) {
        if (sortField === field) { sortOrder = sortOrder === 'asc' ? 'desc' : 'asc'; }
        else { sortField = field; sortOrder = 'asc'; }
        routes.sort(function(a, b) {
          var va = a[field] || '', vb = b[field] || '';
          if (typeof va === 'string') va = va.toLowerCase();
          if (typeof vb === 'string') vb = vb.toLowerCase();
          if (va < vb) return sortOrder === 'asc' ? -1 : 1;
          if (va > vb) return sortOrder === 'asc' ? 1 : -1;
          return 0;
        });
        renderRoutes();
      };

      // ----- CRUD -----
      window.openRouteModal = function() {
        editingId = null;
        document.getElementById('routeModalTitle').textContent = '新建路由';
        document.getElementById('rName').value = '';
        document.getElementById('rUri').value = '';
        document.getElementById('rPriority').value = '0';
        document.querySelectorAll('.method-cb').forEach(function(cb) { cb.checked = cb.value === 'GET' || cb.value === 'POST'; });
        document.getElementById('rCluster').value = '1';
        document.getElementById('rUpstream').value = '1';
        document.getElementById('rHosts').value = '';
        document.getElementById('rDesc').value = '';
        document.getElementById('rStatus').checked = true;
        window.openModal('routeModal');
      };

      window.editRoute = function(id) {
        var r = routes.find(function(x) { return x.id === id; });
        if (!r) return;
        editingId = id;
        document.getElementById('routeModalTitle').textContent = '编辑路由 — ' + r.name;
        document.getElementById('rName').value = r.name;
        document.getElementById('rUri').value = r.uri;
        document.getElementById('rPriority').value = r.priority;
        var methods = r.methods.split(',');
        document.querySelectorAll('.method-cb').forEach(function(cb) { cb.checked = methods.indexOf(cb.value) >= 0; });
        document.getElementById('rCluster').value = r.cluster_id;
        document.getElementById('rUpstream').value = r.upstream_id;
        document.getElementById('rHosts').value = r.hosts || '';
        document.getElementById('rDesc').value = r.description || '';
        document.getElementById('rStatus').checked = r.status === 1;
        window.openModal('routeModal');
      };

      window.saveRoute = function() {
        var name = document.getElementById('rName').value.trim();
        var uri = document.getElementById('rUri').value.trim();
        if (!name) { showToast('请输入路由名称', 'error'); return; }
        if (!uri) { showToast('请输入 URI', 'error'); return; }
        var priority = parseInt(document.getElementById('rPriority').value) || 0;
        var methods = [];
        document.querySelectorAll('.method-cb:checked').forEach(function(cb) { methods.push(cb.value); });
        if (methods.length === 0) { showToast('请选择至少一个请求方法', 'error'); return; }
        var cluster = parseInt(document.getElementById('rCluster').value);
        var upstream = parseInt(document.getElementById('rUpstream').value);
        var hosts = document.getElementById('rHosts').value.trim();
        var desc = document.getElementById('rDesc').value.trim();
        var status = document.getElementById('rStatus').checked ? 1 : 0;

        if (editingId) {
          var r = routes.find(function(x) { return x.id === editingId; });
          if (r) {
            r.name = name; r.uri = uri; r.priority = priority; r.methods = methods.join(',');
            r.cluster_id = cluster; r.upstream_id = upstream; r.hosts = hosts;
            r.description = desc; r.status = status; r.current_version++;
            showToast('路由已更新', 'success');
          }
        } else {
          routes.push({
            id: routes.length + 1, cluster_id: cluster, name: name, uri: uri,
            methods: methods.join(','), priority: priority, status: status,
            description: desc, upstream_id: upstream, hosts: hosts,
            plugins: [], current_version: 1, created_at: new Date().toISOString()
          });
          showToast('路由已创建', 'success');
        }
        window.closeModal('routeModal');
        renderRoutes();
      };

      window.deleteRoute = function(id) {
        if (!confirm('确定删除该路由？')) return;
        routes = routes.filter(function(x) { return x.id !== id; });
        showToast('路由已删除', 'info');
        renderRoutes();
      };

      window.toggleRoute = function(id) {
        var r = routes.find(function(x) { return x.id === id; });
        if (r) {
          r.status = r.status === 1 ? 0 : 1;
          showToast('路由 ' + (r.status === 1 ? '已启用' : '已禁用'), 'success');
          renderRoutes();
        }
      };

      window.publishRoute = function(id) {
        var r = routes.find(function(x) { return x.id === id; });
        if (r) {
          r.current_version++;
          showToast('✅ 路由 "' + r.name + '" 发布成功，已同步到 3 个节点（v' + r.current_version + '）', 'success');
          renderRoutes();
        }
      };

      window.publishAllRoutes = function() {
        showToast('✅ 全部路由发布成功，已同步到 Edge 节点', 'success');
      };

      // ----- Init -----
      renderRoutes();

    })();
  </script>
</body>
</html>
