<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>磐石 Gateway Admin - 登录</title>
  <link rel="stylesheet" href="styles/theme.css">
  <style>
    /* ===========================
       Login Page — 磐石 Gateway
       Extends the design system
       =========================== */

    .login-body {
      background: var(--sidebar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    /* Subtle radial glow over the dark background */
    .login-body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 600px 400px at 50% 40%, oklch(56% 0.16 210 / 6%), transparent);
      pointer-events: none;
    }

    /* ===========================
       Login Card
       =========================== */
    .login-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 12px 40px oklch(0% 0 0 / 30%);
      width: 100%;
      max-width: 400px;
      padding: 44px 36px 32px;
      animation: cardFadeIn 0.4s ease;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===========================
       Logo / Brand
       =========================== */
    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-brand-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--sidebar-active), oklch(50% 0.16 210));
      border-radius: var(--radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
      box-shadow: 0 4px 12px oklch(56% 0.16 210 / 25%);
    }

    .login-brand-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fg);
      display: block;
      line-height: 1.3;
    }

    .login-brand-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    .login-divider {
      width: 32px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin: 16px auto 20px;
      opacity: 0.5;
    }

    /* ===========================
       Error Message
       =========================== */
    .login-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: oklch(55% 0.18 28 / 8%);
      border: 1px solid oklch(55% 0.18 28 / 18%);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--danger);
      line-height: 1.4;
    }

    .login-error.visible {
      display: flex;
    }

    .login-error-icon {
      flex-shrink: 0;
      font-size: 14px;
    }

    /* ===========================
       Form Fields
       =========================== */
    .login-field {
      margin-bottom: 18px;
    }

    .login-field .form-input {
      height: 42px;
      padding: 0 14px;
      font-size: 14px;
    }

    .login-field .form-input.error {
      border-color: var(--danger);
    }

    .login-field .form-input.error:focus {
      box-shadow: 0 0 0 3px oklch(55% 0.18 28 / 12%);
    }

    .login-input-wrap {
      position: relative;
    }

    .login-input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
      opacity: 0.5;
    }

    .login-input-wrap .form-input {
      padding-left: 36px;
    }

    /* ===========================
       Remember Me Checkbox
       =========================== */
    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      border-radius: 3px;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* ===========================
       Login Button
       =========================== */
    .login-btn {
      width: 100%;
      height: 42px;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-md);
      transition: all 0.15s;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .login-btn .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid oklch(100% 0 0 / 30%);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .login-btn.loading {
      pointer-events: none;
      opacity: 0.85;
    }

    .login-btn.loading .btn-spinner {
      display: inline-block;
    }

    .login-btn.loading .btn-text {
      display: none;
    }

    /* ===========================
       Token Auth Hint
       =========================== */
    .login-token-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 11px;
      color: oklch(50% 0.018 240 / 35%);
      font-family: var(--font-mono);
    }

    .login-token-hint .token-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.4;
    }

    .login-token-hint .token-key {
      opacity: 0.6;
      font-size: 12px;
    }

    /* ===========================
       Footer
       =========================== */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .login-footer-version {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .login-footer-copy {
      font-size: 10px;
      color: oklch(50% 0.018 240 / 35%);
      margin-top: 4px;
    }

    /* ===========================
       Responsive
       =========================== */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 20px 24px;
      }

      .login-brand-icon {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .login-brand-name {
        font-size: 19px;
      }

      .login-field .form-input {
        height: 40px;
        font-size: 13px;
      }

      .login-btn {
        height: 40px;
        font-size: 13px;
      }

      .login-options {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .login-error {
        font-size: 11px;
      }
    }

    @media (max-width: 360px) {
      .login-card {
        padding: 24px 16px 20px;
      }
    }
  </style>
</head>
<body class="login-body">

  <!-- Toast container (reuses theme.css toast system) -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ============================
       Login Card
       ============================ -->
  <div class="login-card" role="main" aria-label="登录表单">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-brand-icon" aria-hidden="true">磐</div>
      <span class="login-brand-name">磐石 Gateway</span>
      <span class="login-brand-sub">API 网关管理平台</span>
      <div class="login-divider"></div>
    </div>

    <!-- Error message -->
    <div id="login-error" class="login-error" role="alert">
      <span class="login-error-icon" aria-hidden="true">&#x26A0;</span>
      <span id="login-error-msg">用户名或密码错误，请重试</span>
    </div>

    <!-- Login form -->
    <form id="login-form" novalidate autocomplete="off">

      <!-- Username -->
      <div class="login-field form-group">
        <label class="form-label" for="username">
          用户名 <span class="required">*</span>
        </label>
        <div class="login-input-wrap">
          <span class="login-input-icon" aria-hidden="true">&#x1F464;</span>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="请输入管理员账号"
            autocomplete="username"
            required
          >
        </div>
      </div>

      <!-- Password -->
      <div class="login-field form-group">
        <label class="form-label" for="password">
          密码 <span class="required">*</span>
        </label>
        <div class="login-input-wrap">
          <span class="login-input-icon" aria-hidden="true">&#x1F512;</span>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="请输入密码"
            autocomplete="current-password"
            required
          >
        </div>
      </div>

      <!-- Remember me + Forgot -->
      <div class="login-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" checked>
          <span>记住我</span>
        </label>
        <a href="#" class="forgot-link" tabindex="-1">忘记密码?</a>
      </div>

      <!-- Submit button -->
      <button type="submit" id="login-btn" class="btn btn-primary login-btn">
        <span class="btn-spinner"></span>
        <span class="btn-text">登 录</span>
      </button>

    </form>

    <!-- Token auth hint -->
    <div class="login-token-hint" aria-hidden="true">
      <span class="token-key">&#x1F511;</span>
      <span>Bearer</span>
      <span class="token-dot"></span>
      <span class="token-dot"></span>
      <span class="token-dot"></span>
      <span class="token-dot"></span>
      <span class="token-dot"></span>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <div class="login-footer-version">磐石 Gateway Admin v1.0</div>
      <div class="login-footer-copy">&copy; 2024 Panshi Gateway</div>
    </div>

  </div>

  <script>
    (function() {
      'use strict';

      /* ------ Dom refs ------ */
      var form      = document.getElementById('login-form');
      var username  = document.getElementById('username');
      var password  = document.getElementById('password');
      var btn       = document.getElementById('login-btn');
      var errorEl   = document.getElementById('login-error');
      var errorMsg  = document.getElementById('login-error-msg');

      /* ------ Demo credentials ------ */
      var DEMO_USER = 'admin';
      var DEMO_PASS = 'admin123';

      /* ------ Toast helper (inline, mirrors app.js) ------ */
      function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        if (!container) return;
        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(100%)';
          toast.style.transition = 'all 0.3s';
          setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
      }

      /* ------ Clear field error state ------ */
      function clearFieldErrors() {
        username.classList.remove('error');
        password.classList.remove('error');
        errorEl.classList.remove('visible');
      }

      /* ------ Set field error state ------ */
      function setFieldError(field, msg) {
        field.classList.add('error');
        errorMsg.textContent = msg;
        errorEl.classList.add('visible');
        field.focus();
      }

      /* ------ Show loading state ------ */
      function setLoading(loading) {
        if (loading) {
          btn.classList.add('loading');
          btn.disabled = true;
        } else {
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      }

      /* ------ Validate & submit ------ */
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        clearFieldErrors();

        var user = username.value.trim();
        var pass = password.value.trim();

        // Validation: required fields
        if (!user && !pass) {
          setFieldError(username, '请输入用户名和密码');
          return;
        }
        if (!user) {
          setFieldError(username, '请输入用户名');
          return;
        }
        if (!pass) {
          setFieldError(password, '请输入密码');
          return;
        }

        // Show loading, simulate API call
        setLoading(true);

        setTimeout(function() {
          // Check credentials
          if (user === DEMO_USER && pass === DEMO_PASS) {
            // Login success
            clearFieldErrors();
            showToast('登录成功，欢迎回来', 'success');

            // Store auth token (simulated)
            sessionStorage.setItem('panshi_token', 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.demo');
            sessionStorage.setItem('panshi_user', user);

            // Redirect to dashboard
            setTimeout(function() {
              window.location.href = 'index.html';
            }, 800);
          } else {
            // Login failed
            setLoading(false);
            setFieldError(password, '用户名或密码错误，请重试');
            password.value = '';
            password.focus();
          }
        }, 1200);
      });

      /* ------ Clear errors on input ------ */
      username.addEventListener('input', clearFieldErrors);
      password.addEventListener('input', clearFieldErrors);

      /* ------ Focus username on load ------ */
      window.addEventListener('DOMContentLoaded', function() {
        username.focus();
      });

    })();
  </script>

</body>
</html>
