# 磐石 Admin — 部署特性配置
# ============================
# 此文件定义当前部署实例启用的功能和插件白名单。
# 修改后需要重启后端服务才能生效。

features:
  # ── Edge 功能 ──────────────────────────────────────
  edge_client: true         # Edge 直连（直接通过 API 管理 Edge 节点）
  edge_import: true         # 从 Edge 节点导入数据
  tools: true               # 开发者工具箱（Lua 转换、SM4 加解密等）

  # ── 安装功能 ──────────────────────────────────────
  install_openresty: true   # 在网关上安装 OpenResty
  install_edge: true        # 在网关上安装 Edge 运行时

  # ── 系统管理 ──────────────────────────────────────
  plugin_switches: true     # 插件启用/禁用开关管理页面

# 插件白名单（空列表 = 不限制，所有插件可用）
# 非空列表时，只允许列表中的插件出现在系统中。
# 即使 plugin_switches 页面也无法管理不在白名单中的插件。
enabled_plugins: []
